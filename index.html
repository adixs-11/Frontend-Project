<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NoBrainer</title>

  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar">
    <h2>QuizHive</h2>
    <div id="center_it">
      <a href="about.html" class="btn-nav">About</a>
      <a href="leaderboard.html" class="btn-nav">Leaderboard</a>
      <a href="categories.html" class="btn-nav">Play</a>
      <select class="btn-nav" onchange="toggleTheme(this.value)">
        <option value="dark" >Dark Theme</option>
        <option value="light" >Light Theme</option>
      </select>
    </div>
  </nav>

  <section class="hero">
    <h1 data-aos="fade-up">
      Learn. Play. Repeat.
    </h1>

    <p data-aos="fade-up" data-aos-delay="100">
      Quizzes that actually feel fun — not like homework.
    </p>

    <a href="categories.html" class="cta" data-aos="zoom-in" data-aos-delay="200">
      Start Quiz →
    </a>
  </section>

  <section class="features">

    <div class="feature" data-aos="fade-up">
      <h3> Fast Quizzes</h3>
      <p>8 questions. No time waste.</p>
    </div>

    <div class="feature" data-aos="fade-up" data-aos-delay="100">
      <h3> Learn While Playing</h3>
      <p>Every question has a fun fact.</p>
    </div>

    <div class="feature" data-aos="fade-up" data-aos-delay="200">
      <h3> Instant Results</h3>
      <p>Know your score immediately.</p>
    </div>

  </section>

  <section class="cta-section" data-aos="fade-up">
    <h2>Know More</h2>
    <a href="about.html" class="cta">About US →</a>
  </section>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });

    function toggleTheme(theme){
      const root = document.documentElement;
      console.log(root)
      if (theme === "light"){
        root.style.setProperty("--text", "#0d1f1a")
        root.style.setProperty("--bg", "#f2f4f0")
        root.style.setProperty("--card", "#e8ece4")
        root.style.setProperty("--border", "#c2ccc0")
        root.style.setProperty("--muted","#4a6358")
      } else {
        root.style.setProperty("--text", "#f1f5f9")
        root.style.setProperty("--bg", " #0f172a")
        root.style.setProperty("--card", "#1e293b")
        root.style.setProperty("--border", "rgba(255,255,255,0.08)")
        root.style.setProperty("--muted","#94a3b8")
      }
    }  

  </script>

</body>
</html>
